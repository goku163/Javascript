<!DOCTYPE html>
<html>
<body>

<h2>JavaScript Arrays</h2>
    <h2>join() and pop()</h2>
    <p>The join() method joins array elements into a string and the pop() method removes the last element from an array.</p>

<p id="myjoin"></p>
    <p id="fruits"></p>
    <p id ="myfirstpop"></p>

<script>
    var fruits = ["Banana", "Orange", "Apple", "Mango"];

    document.getElementById("myjoin").innerHTML = fruits.join(" * ");

    document.getElementById("fruits").innerHTML = fruits;

    fruits.pop();

    document.getElementById("myfirstpop").innerHTML = fruits;



</script>

</body>
</html>
