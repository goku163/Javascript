<!DOCTYPE html>
<html>
    <body>

        <h2>Javascript Objects and its Properties</h2>

        <p>Here are two different ways to access an object property</p>

        <p>You can use .property or {"property"}</p>
        <p id="demo"></p>
        <script>
        // create an object:
        var person = {
        firstName: "Aehsaas",
        age: 13,
        };

        // Display some data from the object:
        document.getElementById("demo").innerHTML = "I am" + person.firstName + "I am" + person.age + " years old";
        </script>
    </body>
</html>
